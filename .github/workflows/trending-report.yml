name: Trending Repositories Report

on:
  schedule:
    - cron: '0 18 * * 5'  # every Friday at 18:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trending-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Restore monitor state
        uses: actions/cache@v4
        with:
          path: |
            last_check.json
            repo_states_*.json
          key: monitor-state-${{ github.ref_name }}
          restore-keys: monitor-state-

      - name: Restore AI summary cache
        uses: actions/cache@v4
        with:
          path: ai_summary_cache.json
          key: ai-summary-cache-${{ github.ref_name }}
          restore-keys: ai-summary-cache-

      - name: Validate secrets
        env:
          G_TOKEN:              ${{ secrets.G_TOKEN }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          G_USERNAME:           ${{ secrets.G_USERNAME }}
        run: |
          set -euo pipefail
          errors=0
          check_secret() {
            local name="$1" value="$2" min_len="${3:-5}"
            if [ -z "$value" ]; then
              echo "::error::Secret '$name' is EMPTY or NOT SET"
              return 1
            elif [ "${#value}" -lt "$min_len" ]; then
              echo "::error::Secret '$name' is too short (${#value} chars)"
              return 1
            else
              echo "✅ $name = ${value:0:4}*** (${#value} chars)"
            fi
          }
          check_secret "G_TOKEN"            "$G_TOKEN"            10 || errors=$((errors+1))
          check_secret "TELEGRAM_BOT_TOKEN" "$TELEGRAM_BOT_TOKEN" 20 || errors=$((errors+1))
          check_secret "TELEGRAM_CHAT_ID"   "$TELEGRAM_CHAT_ID"   5  || errors=$((errors+1))
          check_secret "G_USERNAME"         "$G_USERNAME"         1  || errors=$((errors+1))
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors secret(s) failed — fix in Settings → Secrets → Actions"
            exit 1
          fi
          echo "✅ All secrets validated"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Trending Report
        env:
          G_TOKEN:              ${{ secrets.G_TOKEN }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          G_USERNAME:           ${{ secrets.G_USERNAME }}
          TELEGRAM_TOPIC_ID:    ${{ secrets.TELEGRAM_TOPIC_ID }}
          SKIP_REPOS:           ${{ vars.SKIP_REPOS }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
          AI_MODEL:             ${{ vars.AI_MODEL }}
          PYTHONUNBUFFERED:     "1"
          PYTHONFAULTHANDLER:   "1"
        run: |
          set -euo pipefail
          echo "::group::Running trending report"
          echo "Started at: $(date -u)"
          python3 -u main.py --trending
          exit_code=$?
          echo "Finished at: $(date -u)"
          echo "Exit code: $exit_code"
          echo "::endgroup::"
          if [ $exit_code -ne 0 ]; then
            echo "::error::main.py --trending exited with code $exit_code"
            exit $exit_code
          fi

      - name: Save monitor state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            last_check.json
            repo_states_*.json
          key: monitor-state-${{ github.ref_name }}-${{ github.run_id }}

      - name: Save AI summary cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ai_summary_cache.json
          key: ai-summary-cache-${{ github.ref_name }}-${{ github.run_id }}

      - name: Summary
        if: always()
        run: |
          {
            echo "## Trending Report Run"
            echo ""
            echo "| Parameter | Value |"
            echo "|-----------|-------|"
            echo "| Time      | $(date -u '+%Y-%m-%d %H:%M UTC') |"
            echo "| Trigger   | \`${{ github.event_name }}\` |"
            echo "| Status    | ${{ job.status }} |"
            echo "| Run       | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
