name: GitHub Repository Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Восстанавливаем состояние монитора из кэша ───────────
      # ВНИМАНИЕ: GitHub Actions кэш истекает через 7 дней неиспользования.
      # При истечении кэша repo_states_*.json будет отсутствовать — это
      # вызывает «холодный старт». Логика защиты от флуда при холодном старте
      # реализована в main.py (флаг IS_COLD_START): вместо уведомлений обо
      # всех исторических коммитах скрипт запишет текущее состояние как
      # базовую линию и отправит одно информационное сообщение в Telegram.
      - name: Restore monitor state
        uses: actions/cache@v4
        with:
          path: |
            last_check.json
            repo_states_*.json
          key: monitor-state-${{ github.ref_name }}
          restore-keys: monitor-state-

      - name: Restore AI summary cache
        uses: actions/cache@v4
        with:
          path: ai_summary_cache.json
          key: ai-summary-cache-${{ github.ref_name }}
          restore-keys: ai-summary-cache-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── ШАГ 1: Проверяем что секреты вообще существуют ────────
      - name: Validate secrets
        env:
          G_TOKEN:              ${{ secrets.G_TOKEN }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          G_USERNAME:           ${{ secrets.G_USERNAME }}
        run: |
          set -euo pipefail

          errors=0

          check_secret() {
            local name="$1"
            local value="$2"
            local min_len="${3:-5}"

            if [ -z "$value" ]; then
              echo "::error::Secret '$name' is EMPTY or NOT SET"
              echo "  → Settings → Secrets → Actions → New secret → $name"
              return 1
            elif [ "${#value}" -lt "$min_len" ]; then
              echo "::error::Secret '$name' is too short (${#value} chars) — probably wrong value"
              return 1
            else
              # Показываем только первые 4 символа для отладки
              echo "✅ $name = ${value:0:4}*** (${#value} chars)"
              return 0
            fi
          }

          check_secret "G_TOKEN"            "$G_TOKEN"            10 || errors=$((errors+1))
          check_secret "TELEGRAM_BOT_TOKEN" "$TELEGRAM_BOT_TOKEN" 20 || errors=$((errors+1))
          check_secret "TELEGRAM_CHAT_ID"   "$TELEGRAM_CHAT_ID"   5  || errors=$((errors+1))
          check_secret "G_USERNAME"         "$G_USERNAME"         1  || errors=$((errors+1))

          # Проверяем формат TELEGRAM_BOT_TOKEN (должен быть NUMBERS:STRING)
          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            if echo "$TELEGRAM_BOT_TOKEN" | grep -qE '^[0-9]{8,12}:[A-Za-z0-9_-]{35}$'; then
              echo "✅ TELEGRAM_BOT_TOKEN format looks correct"
            else
              echo "::warning::TELEGRAM_BOT_TOKEN format looks wrong!"
              echo "  Expected format: 1234567890:ABCDefgh..."
              echo "  Got length: ${#TELEGRAM_BOT_TOKEN} chars"
            fi
          fi

          # Проверяем формат CHAT_ID (число, может быть отрицательным для групп)
          if [ -n "$TELEGRAM_CHAT_ID" ]; then
            if echo "$TELEGRAM_CHAT_ID" | grep -qE '^-?[0-9]+$'; then
              echo "✅ TELEGRAM_CHAT_ID format looks correct ($TELEGRAM_CHAT_ID)"
            else
              echo "::error::TELEGRAM_CHAT_ID must be a number! Got: '$TELEGRAM_CHAT_ID'"
              echo "  For private chat: positive number (e.g. 123456789)"
              echo "  For group/channel: negative number (e.g. -1001234567890)"
              errors=$((errors+1))
            fi
          fi

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "::error::$errors secret(s) failed validation. Fix them in:"
            echo "  Settings → Secrets and variables → Actions"
            exit 1
          fi

          echo ""
          echo "✅ All secrets validated"

      # ── ШАГ 2: Запуск основного скрипта с подробным логом ─────
      - name: Run GitHub Monitor
        env:
          G_TOKEN:              ${{ secrets.G_TOKEN }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          G_USERNAME:           ${{ secrets.G_USERNAME }}
          TELEGRAM_TOPIC_ID:    ${{ secrets.TELEGRAM_TOPIC_ID }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
          SKIP_REPOS:           ${{ vars.SKIP_REPOS }}
          FORCE_SEND:           ${{ vars.FORCE_SEND }}
          AI_MODEL:             ${{ vars.AI_MODEL }}
          PYTHONUNBUFFERED:     "1"
          PYTHONFAULTHANDLER:   "1"
        run: |
          set -euo pipefail

          echo "::group::Running main.py"
          echo "Started at: $(date -u)"

          python3 -u main.py
          exit_code=$?

          echo "Finished at: $(date -u)"
          echo "Exit code: $exit_code"
          echo "::endgroup::"

          if [ $exit_code -ne 0 ]; then
            echo "::error::main.py exited with code $exit_code"
            exit $exit_code
          fi

      # ── ШАГ 3: Сохраняем state и AI-кэш ──────────────────────────
      # actions/cache@v4 автоматически сохраняет кэш после job.
      # Чтобы обновлять кэш при каждом прогоне используем save-always.
      - name: Save monitor state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            last_check.json
            repo_states_*.json
          key: monitor-state-${{ github.ref_name }}-${{ github.run_id }}

      - name: Save AI summary cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ai_summary_cache.json
          key: ai-summary-cache-${{ github.ref_name }}-${{ github.run_id }}

      - name: Summary
        if: always()
        run: |
          {
            echo "## 📊 Monitor Run"
            echo ""
            echo "| Параметр | Значение |"
            echo "|----------|----------|"
            echo "| Время    | $(date -u '+%Y-%m-%d %H:%M UTC') |"
            echo "| Триггер  | \`${{ github.event_name }}\` |"
            echo "| Статус   | ${{ job.status }} |"
            echo "| AI       | ${{ secrets.ANTHROPIC_API_KEY != '' && 'включён' || 'выключен (ANTHROPIC_API_KEY не задан)' }} |"
            echo "| Run      | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
