name: GitHub Repository Monitor

on:
  schedule:
    # Запуск каждые 30 минут
    - cron: '*/30 * * * *'
  workflow_dispatch: # Ручной запуск для тестирования
  push:
    branches: [ main ] # Автоматический запуск при коммите в main
  pull_request:
    branches: [ main ] # Запуск при PR

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run GitHub Monitor
      env:
        G_TOKEN: ${{ secrets.G_TOKEN }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        G_USERNAME: ${{ secrets.G_USERNAME }}
      run: |
        echo "Starting monitor..."
        echo "Checking environment variables:"
        echo "G_TOKEN: ${G_TOKEN:0:10}..."
        echo "TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:0:10}..."
        echo "TELEGRAM_CHAT_ID: $TELEGRAM_CHAT_ID"
        echo "G_USERNAME: $G_USERNAME"
        python main.py
        
    - name: Log execution
      run: |
        echo "Monitor executed at $(date)"
